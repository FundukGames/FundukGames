<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7955768025744255" crossorigin="anonymous"></script>
  <title>Nutfall — Play the Free 3D Plinko Idle Game</title>
  <meta name="description" content="Play Nutfall free in your browser: nuts rain down a tree trunk and bounce off the +/× modifiers and tornadoes you place. Merge, upgrade and climb the levels. No login." />
  <link rel="canonical" href="https://fundukgames.com/nutfall/play.html" />
  <meta property="og:image" content="https://fundukgames.com/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="theme-color" content="#6c4cff" />
  <style>
    :root {
      --purple: #6c4cff; --purple-d: #5a3de0; --pink: #ff5ca8;
      --gold: #ffce3a; --green: #19c37d; --ink: #2a2150; --ink-soft: #6b6390;
      --panel: #ffffff; --bg1: #b9a9ff; --bg2: #e9e2ff;
      --shadow: 0 6px 18px rgba(60,40,120,.18); --radius: 16px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; height: 100%; overflow: hidden; color: var(--ink);
      font-family: "Baloo 2", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(120% 100% at 50% 0%, var(--bg2), var(--bg1)); }

    #app { display: grid; grid-template-rows: auto 1fr auto; grid-template-columns: minmax(0, 1fr);
      height: 100dvh; gap: 10px; padding: 10px; overflow: hidden; }

    /* Top bar */
    #topbar { display: flex; align-items: center; gap: 12px; font-variant-numeric: tabular-nums; }
    .balance { display: inline-flex; align-items: center; gap: 8px; font-weight: 800; font-size: 1.35rem;
      color: var(--ink); background: linear-gradient(180deg, #fff, #fff5d6); border: 2px solid #ffe08a;
      padding: 6px 16px 6px 12px; border-radius: 999px; box-shadow: var(--shadow); }
    .balance .ico { font-size: 1.2rem; }
    #score { display: inline-block; min-width: 5ch; text-align: right; font-variant-numeric: tabular-nums; }
    #hint { font-weight: 700; color: var(--purple-d); background: #ffffffcc; padding: 5px 12px;
      border-radius: 999px; font-size: .82rem; min-height: 0; }
    #hint:empty { display: none; }
    .levelchip { font-weight: 800; background: #fff; color: var(--purple-d); padding: 6px 13px;
      border-radius: 999px; box-shadow: var(--shadow); font-size: .95rem; white-space: nowrap; }
    .stagename { font-weight: 800; color: #fff; text-shadow: 0 1px 2px #0006; font-size: .9rem; white-space: nowrap; }
    .fieldchip { font-weight: 800; background: #ffffffcc; color: var(--purple-d); padding: 5px 11px;
      border-radius: 999px; font-size: .82rem; white-space: nowrap; }
    .nextbtn { pointer-events: auto; border: 0; border-radius: 999px; padding: 7px 16px; font-weight: 800;
      font-size: .85rem; cursor: pointer; white-space: nowrap; color: #fff; box-shadow: 0 3px 0 rgba(0,0,0,.18);
      background: linear-gradient(180deg, #2fe39a, var(--green)); transition: transform .08s; }
    .nextbtn:active { transform: translateY(2px); }
    .nextbtn:disabled { background: #c9c2e6; color: #fff; box-shadow: none; cursor: default; }
    .lvlbar { flex: 0 1 150px; height: 12px; background: #ffffff55; border-radius: 999px; overflow: hidden;
      box-shadow: inset 0 1px 2px rgba(0,0,0,.25); }
    .lvlbar i { display: block; height: 100%; width: 0%; border-radius: 999px;
      background: linear-gradient(90deg, var(--gold), var(--pink)); transition: width .4s ease; }
    #toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%) translateY(-10px);
      background: var(--ink); color: #fff; font-weight: 800; padding: 12px 22px; border-radius: 14px;
      box-shadow: var(--shadow); opacity: 0; pointer-events: none; z-index: 50; }
    #toast.show { animation: toast 2.8s ease forwards; }
    @keyframes toast { 0% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
      8% { opacity: 1; transform: translateX(-50%) translateY(0); }
      82% { opacity: 1; } 100% { opacity: 0; transform: translateX(-50%) translateY(-10px); } }
    .mtype.locked { opacity: .5; cursor: default; }

    /* First-time onboarding coachmark */
    #tip { position: fixed; top: 104px; left: 50%; transform: translateX(-50%) translateY(-6px);
      background: #fffbe6; color: var(--ink); font-weight: 700; font-size: .92rem; padding: 10px 18px;
      border-radius: 14px; box-shadow: var(--shadow); border: 2px solid #ffe08a; opacity: 0; pointer-events: none;
      z-index: 45; transition: opacity .25s, transform .25s; max-width: 80vw; text-align: center; }
    #tip.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #tip b { color: var(--purple-d); }

    .stat { margin-left: auto; font-size: .78rem; font-weight: 700; color: var(--ink-soft); background: #ffffffaa;
      padding: 5px 10px; border-radius: 999px; }
    /* Sound + full-reset: proper touch targets, visually separated (reset is destructive) */
    #sndbtn, #resetbtn { border: 0; cursor: pointer; font-size: 1.05rem; min-width: 42px; min-height: 42px;
      display: inline-flex; align-items: center; justify-content: center; border-radius: 13px; margin-left: 0; }
    #resetbtn { margin-left: 10px; }
    #homelink { display: inline-flex; align-items: center; min-height: 40px; padding: 6px 13px; border-radius: 999px;
      background: #ffffffcc; color: var(--purple-d); font-weight: 800; font-size: .9rem; text-decoration: none;
      box-shadow: var(--shadow); white-space: nowrap; }
    #homelink:hover { background: #fff; }

    /* Board: rails + arena */
    #board { display: grid; grid-template-columns: 232px 1fr 232px; gap: 10px; min-height: 0; }
    .rail { background: var(--panel); border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 12px; overflow: auto; }
    .rail h3 { margin: 0 0 10px; font-size: .82rem; text-transform: uppercase; letter-spacing: .06em; color: var(--ink-soft); }
    #arena { position: relative; border-radius: 22px; overflow: hidden; min-height: 0;
      box-shadow: inset 0 0 0 5px #ffffff22, var(--shadow); }
    #arena canvas { display: block; touch-action: none; }
    #popups { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
    #lanebtns { position: absolute; inset: 0; pointer-events: none; }
    #lanebtns .lanebtn { position: absolute; transform: translate(-50%, -50%); pointer-events: auto; border: 0;
      border-radius: 9px; background: linear-gradient(180deg, #ffd964, #f5a623); color: #4a2e00; font-weight: 800;
      font-size: .72rem; padding: 9px 10px; min-height: 36px; cursor: pointer; box-shadow: 0 2px 0 rgba(0,0,0,.25); white-space: nowrap; }
    #lanebtns .lanebtn:disabled { background: #b9a85e; color: #6b5a2a; box-shadow: none; cursor: default; opacity: .7; }

    /* Bottom bar: inventory + controls */
    #bottombar { display: flex; align-items: center; gap: 10px; }
    #inventory { display: flex; gap: 6px; overflow-x: auto; padding: 8px; background: var(--panel);
      border-radius: var(--radius); box-shadow: var(--shadow); flex: 1; min-height: 56px; }
    #inventory .slot { flex: 0 0 auto; width: 40px; height: 40px; border: 2px dashed #cfc6f0; border-radius: 10px;
      background: #f3f0ff; color: var(--ink); font-weight: 800; font-size: .72rem; cursor: pointer; transition: transform .1s; }
    #inventory .slot.filled { border: none; box-shadow: 0 2px 0 rgba(0,0,0,.18); }
    #inventory .slot.sel { outline: 3px solid var(--purple); outline-offset: 1px; transform: translateY(-3px); }
    #inventory .empty { color: var(--ink-soft); font-size: .8rem; padding: 8px 4px; font-weight: 700; }

    #controls { display: flex; gap: 8px; }
    .btn { border: 0; border-radius: 14px; padding: 13px 20px; font-weight: 800; font-size: 1rem; cursor: pointer;
      color: #fff; box-shadow: 0 4px 0 rgba(0,0,0,.18); transition: transform .08s, box-shadow .08s; }
    .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,.18); }
    .btn-fire { background: linear-gradient(180deg, #8a6cff, var(--purple)); }
    .btn-flow { background: linear-gradient(180deg, #9aa0b8, #6b7088); }
    .btn-flow.on { background: linear-gradient(180deg, #2fe39a, var(--green)); }

    /* Tabs (mobile only) */
    #tabs { display: none; gap: 8px; }
    #tabs button { flex: 1; border: 0; border-radius: 12px; padding: 11px 0; font-weight: 800; cursor: pointer;
      background: #ffffffcc; color: var(--ink); box-shadow: var(--shadow); }
    #tabs button.on { background: var(--purple); color: #fff; }

    /* Upgrade rows */
    .up-row { display: flex; align-items: center; gap: 8px; padding: 9px; border-radius: 12px; margin-bottom: 8px;
      background: #f5f2ff; }
    .up-row .info { flex: 1; min-width: 0; }
    .up-row .info b { font-size: .86rem; }
    .up-row .info span { display: block; font-size: .7rem; color: var(--ink-soft); }
    .up-row .info .now { color: var(--purple-d); font-weight: 800; }
    .up-row .buy { border: 0; border-radius: 10px; background: linear-gradient(180deg,#8a6cff,var(--purple)); color: #fff;
      font-weight: 800; font-size: .76rem; padding: 9px 11px; cursor: pointer; white-space: nowrap; box-shadow: 0 3px 0 rgba(0,0,0,.15); }
    .up-row .buy:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,.15); }
    .up-row .buy:disabled { background: #d9d3f0; color: #fff; box-shadow: none; cursor: default; }

    /* Merchant */
    #mod-types { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    #mod-types .mtype { flex: 1 1 30%; border: 0; border-radius: 11px; color: #2a2150; font-weight: 800; padding: 9px 0;
      cursor: pointer; font-size: .82rem; opacity: .55; box-shadow: 0 3px 0 rgba(0,0,0,.12); transition: opacity .1s, transform .08s; }
    #mod-types .mtype.sel { opacity: 1; transform: translateY(-2px); outline: 3px solid #ffffff; }
    #buy-box.fixed .bb-qty { display: none; }
    #buy-box { padding: 12px; background: #f5f2ff; border-radius: 14px; }
    .bb-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .bb-head .chip { border: 0; border-radius: 999px; font-weight: 800; padding: 7px 16px; color: #2a2150; font-size: 1.15rem;
      box-shadow: 0 3px 0 rgba(0,0,0,.14); }
    .bb-head span { font-size: .76rem; color: var(--ink-soft); font-weight: 700; }
    .bb-qty { display: flex; align-items: center; gap: 9px; }
    .bb-qty button { width: 34px; height: 34px; border: 0; border-radius: 10px; background: var(--purple); color: #fff;
      font-weight: 900; font-size: 1.2rem; cursor: pointer; box-shadow: 0 3px 0 rgba(0,0,0,.15); }
    .bb-qty button:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,.15); }
    .bb-qty input[type=range] { flex: 1; min-width: 0; accent-color: var(--purple); }
    .bb-foot { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 12px; }
    .bb-foot #bb-qtyl { font-weight: 800; font-size: 1.05rem; }
    .bb-foot .buy { border: 0; border-radius: 12px; background: linear-gradient(180deg,#ffd964,#f5a623); color: #4a2e00;
      font-weight: 900; font-size: .9rem; padding: 11px 16px; cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,.18); }
    .bb-foot .buy:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,.18); }
    .bb-foot .buy:disabled { background: #ddd6f0; color: #fff; box-shadow: none; cursor: default; }

    /* Full-reset confirmation modal */
    #reset-modal { position: fixed; inset: 0; z-index: 70; display: flex; align-items: center;
      justify-content: center; background: rgba(20,12,48,.55); }
    #reset-modal[hidden] { display: none; }
    .rm-panel { background: #fff; border-radius: 18px; box-shadow: 0 18px 50px rgba(30,15,80,.4);
      padding: 22px 24px; max-width: 330px; width: calc(100vw - 48px); text-align: center; }
    .rm-panel h3 { margin: 0 0 8px; font-size: 1.15rem; }
    .rm-panel p { margin: 0 0 16px; font-size: .88rem; color: var(--ink-soft); font-weight: 600; line-height: 1.45; }
    .rm-btns { display: flex; gap: 10px; }
    .rm-btns button { flex: 1; border: 0; border-radius: 12px; padding: 11px 0; font-weight: 800;
      font-family: inherit; font-size: .9rem; cursor: pointer; box-shadow: 0 3px 0 rgba(0,0,0,.15); }
    .rm-btns button:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,.15); }
    #rm-cancel { background: #f0ecff; color: var(--purple-d); }
    #rm-confirm { background: linear-gradient(180deg, #ff7a7a, #e64949); color: #fff; }

    /* Tutorial coach: a pointing hand that demonstrates gestures (game.js drives it) */
    #coach { position: fixed; inset: 0; pointer-events: none; z-index: 60; }
    #coach-hand { position: fixed; left: 0; top: 0; width: 56px; height: 56px;
      transform-origin: 24.7px 5.3px; opacity: 0; transition: opacity .25s;
      filter: drop-shadow(0 6px 10px rgba(28,15,64,.45)); will-change: transform; z-index: 3; }
    #coach-hand.show { opacity: 1; }
    #coach-hand svg { display: block; }
    #coach-ring { position: fixed; border: 3px solid var(--gold); opacity: 0; transition: opacity .25s;
      box-shadow: 0 0 0 0 rgba(255,206,58,.55); }
    #coach-ring.show { opacity: 1; animation: coach-pulse 1.4s ease-out infinite; }
    @keyframes coach-pulse { 0% { box-shadow: 0 0 0 0 rgba(255,206,58,.55); }
      100% { box-shadow: 0 0 0 14px rgba(255,206,58,0); } }
    #coach-bubble { position: fixed; max-width: 260px; background: #fff; color: var(--ink);
      font-weight: 700; font-size: .92rem; line-height: 1.35; padding: 11px 14px; border-radius: 14px;
      border: 2px solid #ffe08a; box-shadow: 0 10px 26px rgba(48,28,110,.28); opacity: 0;
      transform: translateY(6px); transition: opacity .25s, transform .25s; z-index: 2; }
    #coach-bubble.show { opacity: 1; transform: none; }
    #coach-bubble b { color: var(--purple-d); }
    #coach-bubble .skip { pointer-events: auto; display: block; margin: 9px 0 0; border: 0;
      background: #f0ecff; color: var(--purple-d); font-weight: 800; font-size: .78rem; font-family: inherit;
      padding: 7px 14px; border-radius: 999px; cursor: pointer; }
    #coach-bubble .skip:active { transform: translateY(1px); }
    .coach-tap { position: fixed; width: 16px; height: 16px; margin: -8px 0 0 -8px; border-radius: 50%;
      border: 3px solid #fff; box-shadow: 0 0 14px rgba(255,255,255,.9); animation: coach-tap .55s ease-out forwards; }
    @keyframes coach-tap { 0% { transform: scale(.5); opacity: .95; } 100% { transform: scale(2.7); opacity: 0; } }

    /* Floating score / crack popups */
    .pop { position: absolute; transform: translate(-50%,-50%); font-weight: 900; font-size: 1.2rem;
      text-shadow: 0 2px 4px rgba(0,0,0,.45); animation: pop 1s ease-out forwards; }
    .pop.gain { color: #b6ffdf; } .pop.crack { color: #ffc1c1; font-size: 1rem; }
    @keyframes pop { 0% { opacity: 0; transform: translate(-50%,-40%) scale(.6); }
      18% { opacity: 1; transform: translate(-50%,-60%) scale(1.1); }
      100% { opacity: 0; transform: translate(-50%,-150%) scale(1); } }

    @media (max-width: 880px) {
      #board { grid-template-columns: minmax(0, 1fr); }
      #topbar { flex-wrap: wrap; row-gap: 6px; }
      .stagename { display: none; }              /* flavor text — not worth a topbar row on phones */
      .stat { display: none; }                   /* hide the nuts/fps debug readout on phones */
      #sndbtn, #resetbtn { display: inline-flex; } /* ...but keep the sound + reset buttons */
      /* compact chips: the whole HUD should fit two rows before the arena */
      .balance { font-size: 1.1rem; padding: 5px 12px 5px 10px; }
      .levelchip { font-size: .82rem; padding: 5px 10px; }
      .fieldchip { font-size: .75rem; padding: 4px 9px; }
      .lvlbar { flex: 1 1 60px; height: 10px; }
      .nextbtn { padding: 6px 12px; font-size: .78rem; }
      #homelink { min-height: 36px; padding: 5px 11px; font-size: .82rem; }
      #homelink .hl-txt { display: none; }       /* just the tree icon on phones */
      #tabs { display: flex; position: relative; z-index: 40; } /* always tappable above the drawer */
      #drawer-backdrop { position: fixed; inset: 0; background: rgba(28,18,56,.42); z-index: 25;
        opacity: 0; pointer-events: none; transition: opacity .22s; }
      body.drawer-left #drawer-backdrop, body.drawer-right #drawer-backdrop { opacity: 1; pointer-events: auto; }
      .rail { position: fixed; left: 10px; right: 10px; bottom: 126px; max-height: 48vh; z-index: 30;
        transform: translateY(150%); transition: transform .26s cubic-bezier(.2,.8,.2,1); }
      body.drawer-left #left { transform: none; }
      body.drawer-right #right { transform: none; }
    }
  </style>
</head>
<body>
  <div id="app">
    <header id="topbar">
      <a id="homelink" href="/" title="All Funduk games — free puzzles">🌳<span class="hl-txt"> Games</span></a>
      <span class="balance"><span class="ico">🌰</span><span id="score">0</span></span>
      <span class="levelchip">Stage <b id="lvl">1</b></span>
      <span class="stagename" id="stagename"></span>
      <span class="fieldchip">🔢 <b id="fieldcount">0/4</b></span>
      <div class="lvlbar"><i id="lvlfill"></i></div>
      <button id="nextbtn" class="nextbtn"></button>
      <span id="hint"></span>
      <span class="stat">nuts <span id="nuts">0</span> · <span id="fps">0</span>fps</span>
      <button id="sndbtn" class="stat" title="Sound on/off">🔊</button>
      <button id="resetbtn" class="stat" title="Reset ALL progress">↺</button>
    </header>
    <div id="toast"></div>
    <div id="tip"></div>

    <div id="board">
      <aside id="left" class="rail"><h3>Upgrades</h3><div id="up-list"></div></aside>
      <section id="arena"><div id="popups"></div><div id="lanebtns"></div></section>
      <aside id="right" class="rail"><h3>Merchant</h3><div id="mod-types"></div><div id="buy-box"></div></aside>
    </div>

    <nav id="tabs">
      <button data-drawer="left">⚙ Upgrades</button>
      <button data-drawer="right">🛒 Shop</button>
    </nav>

    <footer id="bottombar">
      <div id="inventory"></div>
    </footer>
  </div>

  <div id="drawer-backdrop"></div>

  <!-- Full-reset confirmation (wired up in game.js) -->
  <div id="reset-modal" hidden>
    <div class="rm-panel">
      <h3>Start over from zero?</h3>
      <p>This wipes <b>all</b> progress — levels, unlocks, upgrades, coins and the board. There is no undo.</p>
      <div class="rm-btns">
        <button id="rm-cancel">Cancel</button>
        <button id="rm-confirm">Reset everything</button>
      </div>
    </div>
  </div>

  <!-- Tutorial coach overlay (see the tutorial section in game.js). The hand is a
       cartoon glove — index finger up, three curled-finger bumps, thumb at the
       left, purple cuff. Its fingertip sits at viewBox (28.25,6) = 24.7,5.3 px,
       which game.js uses as the pointing anchor. -->
  <div id="coach"><div id="coach-ring"></div><div id="coach-bubble"></div>
    <div id="coach-hand" aria-hidden="true"><svg viewBox="0 0 64 64" width="56" height="56">
      <g stroke="#2a2150" stroke-width="5" stroke-linejoin="round" stroke-linecap="round" fill="#fff">
        <rect x="22.5" y="6" width="11.5" height="28" rx="5.7"/>
        <ellipse cx="36" cy="40" rx="14" ry="11.5"/>
        <circle cx="37.5" cy="30" r="5"/>
        <circle cx="43.5" cy="31.5" r="4.6"/>
        <circle cx="48" cy="34.5" r="4"/>
        <ellipse cx="21" cy="36.5" rx="5" ry="7" transform="rotate(-15 21 36.5)"/>
      </g>
      <g fill="#fff"><!-- second fill pass hides the strokes where the shapes overlap -->
        <rect x="22.5" y="6" width="11.5" height="28" rx="5.7"/>
        <ellipse cx="36" cy="40" rx="14" ry="11.5"/>
        <circle cx="37.5" cy="30" r="5"/>
        <circle cx="43.5" cy="31.5" r="4.6"/>
        <circle cx="48" cy="34.5" r="4"/>
        <ellipse cx="21" cy="36.5" rx="5" ry="7" transform="rotate(-15 21 36.5)"/>
      </g>
      <g fill="none" stroke="#2a2150" stroke-width="2.4" stroke-linecap="round">
        <path d="M40.5 28q1.5 3 .8 6"/>
        <path d="M45.8 30.5q1.5 2.5 .8 5.2"/>
        <path d="M23.5 33.5q-2.5 2 -2.3 5"/>
      </g>
      <rect x="24" y="48" width="25" height="11" rx="4.5" fill="#6c4cff" stroke="#2a2150" stroke-width="3"/>
      <circle cx="36.5" cy="53.5" r="1.7" fill="#ffce3a"/>
    </svg></div>
  </div>

  <script>
    // Mobile drawers: each tab toggles its panel (tap again — or the backdrop — to close).
    function closeDrawers() {
      document.body.classList.remove("drawer-left", "drawer-right");
      document.querySelectorAll("#tabs button").forEach((x) => x.classList.remove("on"));
    }
    document.querySelectorAll("#tabs button").forEach((b) => {
      b.addEventListener("click", () => {
        const cls = b.dataset.drawer === "left" ? "drawer-left" : "drawer-right";
        const isOpen = document.body.classList.contains(cls);
        closeDrawers();
        if (!isOpen) { document.body.classList.add(cls); b.classList.add("on"); }
      });
    });
    document.getElementById("drawer-backdrop").addEventListener("click", closeDrawers);
  </script>
  <script type="importmap">
  { "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
  } }
  </script>
  <script type="module" src="js/game.js"></script>
</body>
</html>
